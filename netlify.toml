# Netlify build config for app.mageid.app (Expo web export).
#
# This file pins the build so the site rebuilds deterministically on every
# push to main. Without it, the build command + publish dir live only in the
# Netlify dashboard — if someone disables the Git integration or the hook
# breaks, pushes silently stop shipping. Config-as-code fixes that.

[build]
  # Netlify's default build image does NOT ship with bun, so we install it
  # in-line before the build. The expo export command produces dist/.
  # We use bun to honor bun.lock for deterministic dependency resolution.
  command = "curl -fsSL https://bun.sh/install | bash && export BUN_INSTALL=\"$HOME/.bun\" && export PATH=\"$BUN_INSTALL/bin:$PATH\" && bun install --frozen-lockfile && bunx expo export --platform web"
  publish = "dist"

[build.environment]
  # Match the local dev setup. Netlify images ship a recent Node; we let
  # Expo CLI pick its own Metro version from the lockfile.
  NODE_VERSION = "20"
  # Skip Netlify's automatic `npm install` — our build command runs
  # `bun install` instead so bun.lock stays authoritative.
  NETLIFY_USE_PNPM = "false"
  NPM_FLAGS = "--version"

# SPA fallback — Expo Router serves all routes from index.html on web. Without
# this, a direct hit on /plans or /prequal-form?token=XYZ 404s because there's
# no physical /plans/index.html on disk.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
