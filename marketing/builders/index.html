<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0B0D10" />
<title>Builder Portfolio — MAGE ID</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;0,9..144,800;1,9..144,500;1,9..144,800&display=swap" rel="stylesheet" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230B0D10'/%3E%3Ctext x='50' y='66' font-family='Inter,system-ui' font-size='52' font-weight='900' text-anchor='middle' fill='%23FF6A1A'%3EM%3C/text%3E%3C/svg%3E" />
<meta property="og:type" content="article" />
<meta property="og:title" content="Construction project — MAGE ID Builder Portfolio" />
<style>
  :root {
    --ink: #0B0D10; --ink-2: #1A1D22; --amber: #FF6A1A; --amber-dark: #E5570F;
    --amber-tint: #FFF1E6; --cream: #F4EFE6; --cream-2: #FAF7F0;
    --surface: #FFFFFF; --bone: #E8DFCD; --bone-2: #F1EAD9;
    --text: #0B0D10; --text-2: #4A5159; --text-muted: #8B9099;
    --shadow-sm: 0 1px 2px rgba(11,13,16,0.04), 0 1px 3px rgba(11,13,16,0.06);
    --shadow-md: 0 4px 12px rgba(11,13,16,0.06), 0 2px 4px rgba(11,13,16,0.04);
    --shadow-lg: 0 24px 48px -16px rgba(11,13,16,0.18), 0 8px 16px -8px rgba(11,13,16,0.08);
    --radius-md: 12px; --radius-lg: 16px; --radius-xl: 24px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--cream); color: var(--text);
    line-height: 1.55; font-size: 15px; min-height: 100vh;
    font-feature-settings: 'cv11', 'ss01', 'ss03';
  }
  .num { font-variant-numeric: tabular-nums; }

  .hero {
    background: var(--ink); color: #fff;
    padding: 28px 20px 60px;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(900px 500px at 92% -10%, rgba(255,106,26,0.20), transparent 60%),
      radial-gradient(600px 400px at -5% 110%, rgba(255,106,26,0.10), transparent 60%);
  }
  .hero-photo {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    opacity: 0.22; filter: grayscale(0.4) contrast(1.05);
    mix-blend-mode: screen;
  }
  .hero-inner {
    position: relative; z-index: 1;
    max-width: 1080px; margin: 0 auto;
  }
  .brand-row { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
  .brand-mark {
    width: 36px; height: 36px; border-radius: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 16px; color: var(--amber);
  }
  .brand-name { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.85); }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 700; letter-spacing: 1.6px;
    color: var(--amber); text-transform: uppercase;
    margin-bottom: 14px;
  }
  .hero-eyebrow::before {
    content: ''; width: 28px; height: 2px;
    background: var(--amber); border-radius: 1px;
  }
  .hero h1 {
    font-family: 'Fraunces', serif;
    font-weight: 700; line-height: 1.04;
    letter-spacing: -0.025em;
    font-size: clamp(34px, 6vw, 64px);
    margin-bottom: 14px;
    max-width: 18ch;
  }
  .hero h1 em { font-style: italic; color: var(--amber); }
  .hero-meta {
    color: rgba(255,255,255,0.72); font-size: 14.5px;
    line-height: 1.55;
    max-width: 60ch;
    margin-bottom: 4px;
  }
  .hero-meta strong { color: #fff; font-weight: 600; }

  .stats-strip {
    max-width: 1080px; margin: -40px auto 0;
    padding: 0 20px; position: relative; z-index: 2;
  }
  .stats-grid {
    display: grid; gap: 12px;
    grid-template-columns: repeat(3, 1fr);
    background: var(--surface);
    border-radius: var(--radius-xl);
    padding: 6px;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--bone-2);
  }
  .stat-card {
    padding: 18px 16px;
    border-radius: 18px;
    position: relative;
  }
  .stat-card:not(:last-child)::after {
    content: ''; position: absolute; right: 0; top: 18%; bottom: 18%;
    width: 1px; background: var(--bone);
  }
  .stat-label {
    font-size: 11px; color: var(--text-muted); font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.2px;
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: 'Fraunces', serif;
    font-size: clamp(20px, 2.4vw, 28px);
    font-weight: 700; letter-spacing: -0.02em;
    line-height: 1.1; color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  @media (max-width: 540px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .stat-card:nth-child(2)::after { display: none; }
    .stat-card:nth-child(3) { grid-column: 1 / -1; border-top: 1px solid var(--bone); }
  }

  .container {
    max-width: 1080px;
    margin: 0 auto;
    padding: 56px 20px 72px;
  }

  .story {
    max-width: 720px;
    margin-bottom: 48px;
  }
  .story h2 {
    font-family: 'Fraunces', serif;
    font-size: clamp(24px, 3.4vw, 36px);
    font-weight: 700; letter-spacing: -0.022em; line-height: 1.18;
    margin-bottom: 16px;
  }
  .story p {
    font-size: 16px; color: var(--text-2); line-height: 1.65;
    white-space: pre-wrap;
  }

  .gallery {
    display: grid; gap: 12px;
    grid-template-columns: repeat(2, 1fr);
    margin-bottom: 56px;
  }
  @media (min-width: 720px) { .gallery { grid-template-columns: repeat(3, 1fr); gap: 14px; } }
  .gallery-photo {
    aspect-ratio: 4 / 3;
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--bone-2);
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    position: relative;
  }
  .gallery-photo:hover { transform: scale(1.01); box-shadow: var(--shadow-md); }
  .gallery-photo img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.4s ease;
  }
  .gallery-photo:hover img { transform: scale(1.04); }
  .gallery-photo-caption {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 10px 12px;
    background: linear-gradient(to top, rgba(11,13,16,0.85), transparent);
    color: #fff; font-size: 12px; font-weight: 600;
  }
  .gallery-photo.tall { grid-column: span 2; aspect-ratio: 16 / 9; }
  @media (max-width: 540px) {
    .gallery-photo.tall { grid-column: 1 / -1; }
  }

  .testimonial {
    background: var(--ink); color: #fff;
    border-radius: var(--radius-xl);
    padding: 44px 36px;
    margin-bottom: 56px;
    position: relative; overflow: hidden;
  }
  .testimonial::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(700px 360px at 95% -20%, rgba(255,106,26,0.22), transparent 60%);
  }
  .testimonial-inner { position: relative; z-index: 1; max-width: 680px; }
  .testimonial-mark {
    font-family: 'Fraunces', serif;
    font-size: 76px; font-weight: 800; line-height: 0.7;
    color: var(--amber); margin-bottom: 12px;
    height: 36px;
  }
  .testimonial-quote {
    font-family: 'Fraunces', serif;
    font-size: clamp(22px, 2.6vw, 30px);
    font-weight: 500; font-style: italic;
    line-height: 1.35; letter-spacing: -0.01em;
    margin-bottom: 18px;
  }
  .testimonial-author {
    font-size: 14px; font-weight: 600;
    color: rgba(255,255,255,0.82);
    letter-spacing: 0.2px;
  }

  .credit {
    display: flex; gap: 18px; align-items: center;
    padding: 22px 24px;
    background: var(--surface);
    border: 1px solid var(--bone-2);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .credit-logo {
    width: 56px; height: 56px; border-radius: 14px;
    background: var(--ink); color: var(--amber);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif;
    font-size: 28px; font-weight: 800;
    flex-shrink: 0;
  }
  .credit-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; }
  .credit-text { flex: 1; min-width: 200px; }
  .credit-eyebrow {
    font-size: 11px; font-weight: 700;
    color: var(--text-muted); letter-spacing: 1.2px;
    text-transform: uppercase; margin-bottom: 4px;
  }
  .credit-name {
    font-family: 'Fraunces', serif;
    font-size: 22px; font-weight: 700;
    letter-spacing: -0.018em; margin-bottom: 4px;
  }
  .credit-meta { font-size: 13px; color: var(--text-2); }
  .credit-meta a { color: var(--amber-dark); text-decoration: none; font-weight: 600; }
  .credit-cta {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--amber); color: #fff;
    padding: 12px 18px; border-radius: 10px;
    text-decoration: none; font-weight: 700; font-size: 14px;
    box-shadow: 0 8px 24px -6px rgba(255,106,26,0.4);
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .credit-cta:hover { background: var(--amber-dark); }
  .credit-cta:active { transform: translateY(1px); }

  .footer {
    text-align: center; padding: 24px 0;
    color: var(--text-muted); font-size: 13px;
    border-top: 1px solid var(--bone);
  }
  .footer a { color: var(--text); text-decoration: none; font-weight: 600; }
  .footer-mark {
    width: 22px; height: 22px; border-radius: 6px;
    background: var(--ink); color: var(--amber);
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 11px;
    vertical-align: middle; margin-right: 6px;
  }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(11,13,16,0.96);
    backdrop-filter: blur(8px);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100; padding: 24px;
    cursor: pointer;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: var(--radius-md); }

  .fallback {
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  .fallback-card {
    background: var(--surface); max-width: 460px;
    padding: 44px 32px; border-radius: var(--radius-xl);
    text-align: center; box-shadow: var(--shadow-lg);
    border: 1px solid var(--bone-2);
  }
  .fallback-card h1 {
    font-family: 'Fraunces', serif; font-size: 26px; font-weight: 700; margin-bottom: 12px;
  }
  .fallback-card p { color: var(--text-2); font-size: 14.5px; margin-bottom: 24px; }
</style>
</head>
<body>

  <div id="fallback" class="fallback" style="display:none">
    <div class="fallback-card">
      <h1>Project not found</h1>
      <p>This portfolio link doesn't include any project data. Try the original share link, or visit <a href="https://mageid.app">mageid.app</a> to learn more.</p>
    </div>
  </div>

  <div id="page" style="display:none">
    <header class="hero">
      <div class="hero-photo" id="hero-photo"></div>
      <div class="hero-inner">
        <div class="brand-row">
          <div class="brand-mark" id="brand-mark">M</div>
          <span class="brand-name" id="brand-name">MAGE ID</span>
        </div>
        <div class="hero-eyebrow" id="hero-eyebrow">Featured project</div>
        <h1 id="project-title">—</h1>
        <div class="hero-meta" id="project-meta"></div>
      </div>
    </header>

    <div class="stats-strip">
      <div class="stats-grid" id="stats-grid"></div>
    </div>

    <main class="container">
      <section id="story" class="story" style="display:none">
        <h2 id="story-headline">—</h2>
        <p id="story-body"></p>
      </section>

      <section id="gallery" class="gallery"></section>

      <section id="testimonial" class="testimonial" style="display:none">
        <div class="testimonial-inner">
          <div class="testimonial-mark">"</div>
          <div class="testimonial-quote" id="testimonial-quote"></div>
          <div class="testimonial-author" id="testimonial-author"></div>
        </div>
      </section>

      <section class="credit">
        <div class="credit-logo" id="credit-logo">M</div>
        <div class="credit-text">
          <div class="credit-eyebrow">Built by</div>
          <div class="credit-name" id="credit-name">—</div>
          <div class="credit-meta" id="credit-meta"></div>
        </div>
        <a class="credit-cta" id="credit-cta" href="https://mageid.app/contact">Get a quote</a>
      </section>

      <footer class="footer">
        <span class="footer-mark">M</span>
        Built with <a href="https://mageid.app">MAGE ID</a> — construction management for general contractors.
      </footer>
    </main>
  </div>

  <div class="lightbox" id="lightbox"><img id="lightbox-img" alt="" /></div>

<script>
(function () {
  'use strict';

  function decodeHash() {
    try {
      var h = window.location.hash || '';
      var m = h.match(/[#&]d=([^&]+)/);
      if (!m) return null;
      var b64 = decodeURIComponent(m[1]).replace(/-/g, '+').replace(/_/g, '/');
      while (b64.length % 4) b64 += '=';
      var json = decodeURIComponent(escape(atob(b64)));
      return JSON.parse(json);
    } catch (e) { console.error('decode failed', e); return null; }
  }
  function fmtMoney(n) {
    if (n == null || isNaN(n)) return '—';
    return '$' + Number(n).toLocaleString(undefined, { maximumFractionDigits: 0 });
  }
  function fmtMonths(days) {
    if (!days) return '—';
    if (days < 30) return days + ' day' + (days === 1 ? '' : 's');
    var months = Math.round(days / 30);
    return months + ' month' + (months === 1 ? '' : 's');
  }
  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function fmtDate(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    if (isNaN(d)) return '';
    return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  }

  function render(data) {
    var company = data.company || {};
    var project = data.project || {};
    var photos = (data.photos || []).filter(function (p) { return !!p.url; });

    document.getElementById('brand-mark').textContent = (company.name || 'M').charAt(0).toUpperCase();
    document.getElementById('brand-name').textContent = company.name || 'MAGE ID';

    var title = project.name || 'Project';
    var titleEl = document.getElementById('project-title');
    var parts = title.trim().split(/\s+/);
    if (parts.length >= 2) {
      var last = parts.pop();
      titleEl.innerHTML = esc(parts.join(' ')) + ' <em>' + esc(last) + '</em>';
    } else {
      titleEl.textContent = title;
    }
    document.title = title + ' — ' + (company.name || 'MAGE ID Builder Portfolio');

    var hide = project.hideStats || [];
    var metaParts = [];
    if (project.address) metaParts.push(esc(project.address));
    if (project.type) metaParts.push(esc(project.type));
    if (project.completedAt) metaParts.push('Completed <strong>' + esc(fmtDate(project.completedAt)) + '</strong>');
    document.getElementById('project-meta').innerHTML = metaParts.join(' · ');

    if (photos.length > 0) {
      document.getElementById('hero-photo').style.backgroundImage = 'url(' + photos[0].url + ')';
    }

    // Stats
    var stats = [];
    if (project.contractValue && hide.indexOf('value') === -1) {
      stats.push({ label: 'Project value', value: fmtMoney(project.contractValue) });
    }
    if (project.durationDays && hide.indexOf('duration') === -1) {
      stats.push({ label: 'Duration', value: fmtMonths(project.durationDays) });
    }
    if (project.squareFootage && hide.indexOf('sqft') === -1) {
      stats.push({ label: 'Square footage', value: project.squareFootage.toLocaleString() + ' sf' });
    }
    if (stats.length === 0) stats.push({ label: 'Built by', value: company.name || 'MAGE ID' });

    document.getElementById('stats-grid').innerHTML = stats.map(function (s) {
      return '<div class="stat-card">' +
        '<div class="stat-label">' + esc(s.label) + '</div>' +
        '<div class="stat-value num">' + esc(s.value) + '</div>' +
      '</div>';
    }).join('');

    // Story
    if (project.headline || project.body) {
      var s = document.getElementById('story');
      s.style.display = 'block';
      document.getElementById('story-headline').textContent = project.headline || 'About the project';
      if (project.body) document.getElementById('story-body').textContent = project.body;
      else document.getElementById('story-body').remove();
    }

    // Gallery — every 5th photo gets the wide treatment for rhythm.
    document.getElementById('gallery').innerHTML = photos.map(function (p, i) {
      var tall = i % 5 === 4 ? ' tall' : '';
      var cap = p.caption ? '<div class="gallery-photo-caption">' + esc(p.caption) + '</div>' : '';
      return '<div class="gallery-photo' + tall + '" data-photo="' + i + '">' +
        '<img loading="lazy" src="' + esc(p.url) + '" alt="' + esc(p.caption || '') + '"/>' + cap +
      '</div>';
    }).join('');

    // Testimonial
    if (data.testimonial && data.testimonial.quote) {
      document.getElementById('testimonial').style.display = 'block';
      document.getElementById('testimonial-quote').textContent = data.testimonial.quote;
      document.getElementById('testimonial-author').textContent = data.testimonial.author ? '— ' + data.testimonial.author : '';
    }

    // Credit / CTA
    document.getElementById('credit-name').textContent = company.name || 'MAGE ID';
    var creditMeta = [];
    if (company.tagline) creditMeta.push(esc(company.tagline));
    if (company.licenseNumber) creditMeta.push('License ' + esc(company.licenseNumber));
    if (company.email) creditMeta.push('<a href="mailto:' + esc(company.email) + '">' + esc(company.email) + '</a>');
    if (company.phone) creditMeta.push(esc(company.phone));
    document.getElementById('credit-meta').innerHTML = creditMeta.join(' · ');
    var ctaHref = company.email ? 'mailto:' + company.email + '?subject=Project%20inquiry%20via%20portfolio' : 'https://mageid.app/contact';
    document.getElementById('credit-cta').setAttribute('href', ctaHref);
    if (company.logoUri) {
      document.getElementById('credit-logo').innerHTML = '<img src="' + esc(company.logoUri) + '" alt="' + esc(company.name || '') + '"/>';
    } else {
      document.getElementById('credit-logo').textContent = (company.name || 'M').charAt(0).toUpperCase();
    }

    // Lightbox
    var lb = document.getElementById('lightbox');
    var lbImg = document.getElementById('lightbox-img');
    document.querySelectorAll('.gallery-photo').forEach(function (el) {
      el.addEventListener('click', function () {
        var idx = parseInt(el.getAttribute('data-photo'), 10);
        var p = photos[idx];
        if (!p) return;
        lbImg.src = p.url;
        lb.classList.add('open');
      });
    });
    lb.addEventListener('click', function () { lb.classList.remove('open'); });

    document.getElementById('page').style.display = 'block';
  }

  var data = decodeHash();
  if (!data) { document.getElementById('fallback').style.display = 'flex'; return; }
  render(data);
})();
</script>
</body>
</html>
